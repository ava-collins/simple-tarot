type Suite @node {
    dominion: String
    element: String!
    name: String!
    zodiac: [String!]!
}

type Card @node {
    description: String!
    image: String!
    index: Int!
    name: String!
    numeral: String!
    title: String!
    type: String!
    keywords: String!
    reversedKeywords: String!
    meanings: [CardPositionMeaning!]! @relationship(type: "FOR_CARD", direction: IN)
}

type Spread @node {
    name: String!
    displayName: String!
    description: String!
    positions: [SpreadPosition!]! @relationship(type: "HAS_POSITION", direction: OUT)
}

type SpreadPosition @node {
    spreadName: String!
    displayName: String!
    description: String!
    index: Int!
    meanings: [CardPositionMeaning!]! @relationship(type: "FOR_POSITION", direction: IN)
}

type Upright @node {
    meaning: String!
}

type Reversed @node {
    meaning: String!
}

type CardPositionMeaning @node {
    upright: [Upright!]! @relationship(type: "HAS_UPRIGHT", direction: OUT)
    reversed: [Reversed!]! @relationship(type: "HAS_REVERSED", direction: OUT)
    meaning(isReversed: Boolean!): String!
        @cypher(
            statement: """
            WITH this,
                 head([(this)-[:HAS_UPRIGHT]->(u:Upright) | u.meaning]) AS uprightMeaning,
                 head([(this)-[:HAS_REVERSED]->(r:Reversed) | r.meaning]) AS reversedMeaning
            RETURN CASE
              WHEN $isReversed THEN coalesce(reversedMeaning, "")
              ELSE coalesce(uprightMeaning, "")
            END AS meaning
            """
            columnName: "meaning"
        )
    card: [Card!]! @relationship(type: "FOR_CARD", direction: OUT)
    position: [SpreadPosition!]! @relationship(type: "FOR_POSITION", direction: OUT)
}

type SpreadCard {
    position: SpreadPosition!
    card: Card!
    reversed: Boolean!
    cardReading: String!
    keywords: [String!]!
}

input SpreadInput {
    description: String!
    displayName: String!
    name: String!
    positions: [ID!]!
}

input SuiteInput {
    dominion: String
    element: String!
    name: String!
    zodiac: [String!]!
}

input CardInput {
    description: String!
    image: String!
    index: Int!
    name: String!
    numeral: String!
    title: String!
    type: String!
    keywords: String!
    reversedKeywords: String!
}

input SpreadPositionInput {
    spreadName: String!
    displayName: String!
    description: String!
    index: Int!
}

input SpreadMutationInput {
    name: String!
    displayName: String!
    description: String!
    spreadPositionIndexes: [Int!]!
}

input UprightInput {
    meaning: String!
}

input ReversedInput {
    meaning: String!
}

input CardPositionMeaningInput {
    cardIndex: Int!
    spreadPositionIndex: Int!
    uprightMeaning: String!
    reversedMeaning: String!
}

input ReadingItemInput {
    cardIndex: Int!
    spreadPositionIndex: Int!
    reversed: Boolean!
}

type AvatarImage {
    thumbnail: String!
}

type Query {
    avatarImages: [AvatarImage!]!
    cardsByIndex(indexes: [Int!]!): [Card!]!
    reading(items: [ReadingItemInput!]!): [SpreadCard!]!
        @cypher(
            statement: """
            UNWIND range(0, size($items) - 1) AS idx
            WITH idx, $items[idx] AS item
            MATCH (card:Card { index: item.cardIndex })
            MATCH (position:SpreadPosition { index: item.spreadPositionIndex })
            OPTIONAL MATCH (meaning:CardPositionMeaning)-[:FOR_CARD]->(card)
            WHERE EXISTS { MATCH (meaning)-[:FOR_POSITION]->(position) }
            OPTIONAL MATCH (meaning)-[:HAS_UPRIGHT]->(upright:Upright)
            OPTIONAL MATCH (meaning)-[:HAS_REVERSED]->(reversedNode:Reversed)
            RETURN {
              card: card {
                .*,
                keywords: coalesce(card.keywords, ""),
                reversedKeywords: coalesce(card.reversedKeywords, ""),
                numeral: coalesce(card.numeral, "")
              },
              position: position {
                .*,
                spreadName: coalesce(position.spreadName, ""),
                displayName: coalesce(position.displayName, ""),
                description: coalesce(position.description, "")
              },
              reversed: item.reversed,
              cardReading: CASE
                WHEN item.reversed THEN coalesce(reversedNode.meaning, "")
                ELSE coalesce(upright.meaning, "")
              END,
              keywords: CASE
                WHEN item.reversed THEN [kw IN split(coalesce(card.reversedKeywords, ""), ",") WHERE trim(kw) <> "" | trim(kw)]
                ELSE [kw IN split(coalesce(card.keywords, ""), ",") WHERE trim(kw) <> "" | trim(kw)]
              END
            } AS reading
            ORDER BY idx
            """
            columnName: "reading"
        )
}

type Mutation {
    addSpread(spread: SpreadInput!): Spread!
        @cypher(
            statement: """
            MERGE (s:Spread { name: $spread.name })
            SET s.displayName = $spread.displayName
            RETURN s
            """
            columnName: "s"
        )
    createSuite(input: SuiteInput!): Suite!
        @cypher(
            statement: """
            CREATE (s:Suite {
              dominion: $input.dominion,
              element: $input.element,
              name: $input.name,
              zodiac: $input.zodiac
            })
            RETURN s
            """
            columnName: "s"
        )
    createCard(input: CardInput!): Card!
        @cypher(
            statement: """
            CREATE (c:Card {
              description: $input.description,
              image: $input.image,
              index: $input.index,
              keywords: $input.keywords,
              name: $input.name,
              numeral: $input.numeral,
              reversedKeywords: $input.reversedKeywords,
              title: $input.title,
              type: $input.type
            })
            RETURN c
            """
            columnName: "c"
        )
    createCards(cards: [CardInput!]!): [Card!]!
        @cypher(
            statement: """
            UNWIND $cards AS cardInput
            MERGE (c:Card { index: cardInput.index })
            SET c.description = cardInput.description,
                c.image = cardInput.image,
                c.keywords = cardInput.keywords,
                c.name = cardInput.name,
                c.numeral = cardInput.numeral,
                c.reversedKeywords = cardInput.reversedKeywords,
                c.title = cardInput.title,
                c.type = cardInput.type
            RETURN c
            ORDER BY c.index
            """
            columnName: "c"
        )
    createSpreadPosition(input: SpreadPositionInput!): SpreadPosition!
        @cypher(
            statement: """
            CREATE (sp:SpreadPosition {
              spreadName: $input.spreadName,
              displayName: $input.displayName,
              description: $input.description,
              index: $input.index
            })
            RETURN sp
            """
            columnName: "sp"
        )
    createSpread(input: SpreadMutationInput!): Spread!
        @cypher(
            statement: """
            MERGE (s:Spread { name: $input.name })
            SET s.displayName = $input.displayName,
                s.description = $input.description
            WITH s, $input.spreadPositionIndexes AS spreadPositionIndexes
            WITH s, spreadPositionIndexes, range(0, size(spreadPositionIndexes) - 1) AS positionIndexes
            WHERE all(i IN positionIndexes WHERE spreadPositionIndexes[i] = i)
            OPTIONAL MATCH (s)-[existing:HAS_POSITION]->(:SpreadPosition)
            DELETE existing
            WITH s, positionIndexes, spreadPositionIndexes
            CALL {
              WITH s, positionIndexes
              UNWIND positionIndexes AS spreadPositionIndex
              MATCH (sp:SpreadPosition { spreadName: s.name, index: spreadPositionIndex })
              MERGE (s)-[:HAS_POSITION]->(sp)
              RETURN count(sp) AS linked
            }
            WITH s, linked, size(spreadPositionIndexes) AS expectedCount
            WHERE linked = expectedCount
            RETURN s
            """
            columnName: "s"
        )
    createUpright(input: UprightInput!): Upright!
        @cypher(
            statement: """
            CREATE (u:Upright {
              meaning: $input.meaning
            })
            RETURN u
            """
            columnName: "u"
        )
    createReversed(input: ReversedInput!): Reversed!
        @cypher(
            statement: """
            CREATE (r:Reversed {
              meaning: $input.meaning
            })
            RETURN r
            """
            columnName: "r"
        )
    createCardPositionMeaning(input: CardPositionMeaningInput!): CardPositionMeaning!
        @cypher(
            statement: """
            MATCH (card:Card { index: $input.cardIndex })
            MATCH (position:SpreadPosition { index: $input.spreadPositionIndex })
            CREATE (meaning:CardPositionMeaning)
            CREATE (upright:Upright {
              meaning: $input.uprightMeaning
            })
            CREATE (reversed:Reversed {
              meaning: $input.reversedMeaning
            })
            MERGE (meaning)-[:FOR_CARD]->(card)
            MERGE (meaning)-[:FOR_POSITION]->(position)
            MERGE (meaning)-[:HAS_UPRIGHT]->(upright)
            MERGE (meaning)-[:HAS_REVERSED]->(reversed)
            RETURN meaning
            """
            columnName: "meaning"
        )
    createCardPositionMeanings(inputs: [CardPositionMeaningInput!]!): [CardPositionMeaning!]!
        @cypher(
            statement: """
            UNWIND $inputs AS input
            MATCH (card:Card { index: input.cardIndex })
            MATCH (position:SpreadPosition { index: input.spreadPositionIndex })
            CREATE (meaning:CardPositionMeaning)
            CREATE (upright:Upright {
              meaning: input.uprightMeaning
            })
            CREATE (reversed:Reversed {
              meaning: input.reversedMeaning
            })
            MERGE (meaning)-[:FOR_CARD]->(card)
            MERGE (meaning)-[:FOR_POSITION]->(position)
            MERGE (meaning)-[:HAS_UPRIGHT]->(upright)
            MERGE (meaning)-[:HAS_REVERSED]->(reversed)
            RETURN meaning
            """
            columnName: "meaning"
        )
}
